{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ cancion.nombre }} - ViveEC</title>
    <link rel="stylesheet" href="{% static 'viveec/css/styles.css' %}">
    <style>
        .player-page { background-color: #0b0b0b; color: #ffffff; font-family: system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; padding: 30px; box-sizing: border-box; }
        .giant-cover { width: 360px; height: 360px; background: linear-gradient(135deg, #1db954 0%, #0b3417 100%); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 100px; margin: 40px auto; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .bottom-controls-container { width: 100%; max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .track-info-row { display: flex; align-items: center; justify-content: space-between; }
        .btn-play-trigger { background-color: #fff; color: #000; border-radius: 50%; width: 60px; height: 60px; border: none; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        .btn-play-trigger:hover { transform: scale(1.06); }
        .btn-like { background: none; border: none; color: #b3b3b3; font-size: 26px; cursor: pointer; }
        .btn-like.activo { color: #1db954; }
        .progress-block { display: flex; align-items: center; gap: 12px; width: 100%; }
        .progress-bar-wrapper { flex: 1; height: 5px; background-color: #3e3e3e; border-radius: 3px; position: relative; }
        .progress-fill { height: 100%; width: 0%; background-color: #1db954; border-radius: 3px; }
        .playback-buttons-center { display: flex; justify-content: center; align-items: center; gap: 24px; }
    </style>
</head>
<body class="player-page">

    <main class="main-display">
        <div class="giant-cover">🎵</div>
    </main>

    <footer class="bottom-controls-container">
        <div class="track-info-row">
            <div class="text-details">
                <h2>{{ cancion.nombre }}</h2>
                <p>{{ cancion.artista }}</p>
            </div>
            <button id="btn-corazon" 
                    class="btn-like {% if tiene_like %}activo{% endif %}" 
                    onclick="intercambiarLike('{{ cancion.id }}')">
                ♥
            </button>
        </div>

        <div class="progress-block">
            <span class="time-stamp" id="current-time">0:00</span>
            <div class="progress-bar-wrapper">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <span class="time-stamp" id="total-time">0:00</span>
        </div>

        <div class="playback-buttons-center">
            <button class="btn-play-trigger" id="play-btn" onclick="togglePlay()">▶</button>
        </div>
    </footer>

    <script>
        const ID_CANCION = "{{ cancion.id }}";
        const DURACION_TOTAL = parseInt("{{ cancion.duracion|default:0 }}");
        const CSRF_TOKEN = "{{ csrf_token }}";

        let timerInterval;
        let isPlaying = false;
        let segundosTranscurridos = 0;

        const playBtn = document.getElementById('play-btn');
        const currentTimeDisplay = document.getElementById('current-time');
        const progressBar = document.getElementById('progress-fill');
        const totalTimeDisplay = document.getElementById('total-time');

        function formatearTiempo(segundos) {
            let mins = Math.floor(segundos / 60);
            let secs = segundos % 60;
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // Inicializar el tiempo total al cargar
        totalTimeDisplay.textContent = formatearTiempo(DURACION_TOTAL);

        function togglePlay() {
            if (!isPlaying) {
                segundosTranscurridos = 0; 
                progressBar.style.width = "0%";
                currentTimeDisplay.textContent = "0:00";
                
                isPlaying = true;
                playBtn.textContent = '⏸';
                timerInterval = setInterval(actualizarUI, 1000);
            } else {
                detenerReproduccion();
            }
        }

        function actualizarUI() {
            segundosTranscurridos++;
            
            currentTimeDisplay.textContent = formatearTiempo(segundosTranscurridos);
            let porcentaje = (segundosTranscurridos / DURACION_TOTAL) * 100;
            progressBar.style.width = Math.min(porcentaje, 100) + "%";

            if (segundosTranscurridos >= DURACION_TOTAL) {
                detenerReproduccion();
            }
        }

        function detenerReproduccion() {
            isPlaying = false;
            playBtn.textContent = '▶';
            clearInterval(timerInterval);
            
            if (segundosTranscurridos > 0) {
                enviarRegistro(segundosTranscurridos);
            }
        }

        function enviarRegistro(segundos) {
            fetch('/registrar-reproduccion/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF_TOKEN },
                body: JSON.stringify({ idCancion: ID_CANCION, tiempo: segundos })
            })
            .then(r => r.json())
            .then(data => console.log("Registro guardado:", data));
        }

        function intercambiarLike(idCancion) {
            const botonCorazon = document.getElementById('btn-corazon');
            fetch('/alternar-like/', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-CSRFToken': CSRF_TOKEN 
                },
                body: JSON.stringify({ idCancion: idCancion })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    botonCorazon.classList.toggle('activo');
                }
            });
        }
    </script>
</body>
</html>
